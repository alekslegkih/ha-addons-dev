configuration:
  schedule:
    name: Расписание резервного копирования
    description: >
      Расписание в формате cron (5 полей).
      Пример: 0 3 * * * — каждый день в 03:00.

  rsync_options:
    name: Параметры rsync
    description: >
      Параметры rsync, используемые для синхронизации.
      Не изменяйте их, если не понимаете их назначение.

  timezone:
    name: Часовой пояс
    description: Часовой пояс, используемый аддоном и планировщиком cron.

  test_mode:
    name: Тестовый режим
    description: Включить режим dry-run (данные не будут копироваться).

  storage:
    name: Настройки хранилища
    description: Настройки исходного диска и диска резервного копирования
    fields:

      source_device:
        name: Устройство источника
        description: >
          Раздел диска, содержащий данные Nextcloud.
          Можно указать имя раздела (например: sda1),
          метку файловой системы (например: data)
          или UUID.

      source_dir:
        name: Каталог данных
        description: >
          Каталог с пользовательскими файлами Nextcloud.
          Можно указать вложенный путь, например:
          data или nextcloud/data.

      destination_device:
        name: Устройство резервного диска
        description: >
          Раздел USB-накопителя для хранения резервных копий.
          Можно указать имя раздела (например: sdb1),
          метку файловой системы (например: backups)
          или UUID.

      destination_dir:
        name: Каталог резервных копий
        description: >
          Каталог на диске резервного копирования,
          куда будут сохраняться данные.

  power:
    name: Управление питанием
    description: Настройки управления питанием диска резервного копирования
    fields:

      enabled:
        name: Включить управление питанием
        description: Включить управление питанием диска резервного копирования.

      disk_switch:
        name: Выключатель питания диска
        description: >
          Полный entity_id выключателя питания диска
          (например: switch.usb_backup_power).
          Обязателен, если управление питанием включено.
