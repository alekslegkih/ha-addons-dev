configuration:
  schedule:
    name: Backup schedule
    description: >
      Schedule in cron format (5 fields).
      Example: 0 3 * * * — every day at 03:00.

  rsync_options:
    name: Rsync options
    description: >
      Rsync options used for synchronization.
      Do not change these options unless you understand their purpose.

  enabled:
    name: Enable power management
    description: Enable power control for the backup disk.

  disk_switch:
    name: Disk power switch
    description: >
      Full entity ID of the power switch controlling the backup disk
      (for example: switch.usb_backup_power).
      Required if power management is enabled.

  storage:
    name: Storage settings
    description: Configuration of source data and backup storage
    fields:

      source_devic:
        name: Source device
        description: >
          Disk partition containing the Nextcloud data.
          You can specify the partition name (for example: sda1),
          filesystem label (for example: data),
          or a UUID.

      source_dir:
        name: Source directory
        description: >
          Directory containing Nextcloud user files.
          Nested paths are allowed, for example:
          data or nextcloud/data.

      destination_devic:
        name: Backup device
        description: >
          USB disk partition used for storing backups.
          You can specify the partition name (for example: sdb1),
          filesystem label (for example: backups),
          or a UUID.

      destination_dir:
        name: Backup directory
        description: >
          Directory on the backup disk where backup data will be stored.

  test_mode:
    name: Test mode
    description: Enable dry-run mode (no data will actually be copied).
