name: "Backup Sync to USB"
description: "Automatically copies Home Assistant backups to connected USB storage"
version: "0.5.4"
slug: "backup_sync"
url: "https://github.com/alekslegkih/ha-addons/tree/main/backup_sync"
arch:
  - amd64
  - aarch64
image: ghcr.io/alekslegkih/backup_sync-dev
startup: application
boot: auto
init: false
privileged:
  - SYS_ADMIN
  - DAC_READ_SEARCH
devices:
  - /dev/sdb1
  - /dev/sdc1
  - /dev/sdd1
  - /dev/sde1
  - /dev/sdf1
  - /dev/sdb2
  - /dev/sdc2
  - /dev/sdd2
  - /dev/sde2
  - /dev/sdf2
  - /dev/sdb3
  - /dev/sdc3
  - /dev/sdd1
  - /dev/sde3
  - /dev/sdf3
  - /dev/sdb4
  - /dev/sdc4
  - /dev/sdd4
  - /dev/sde4
  - /dev/sdf4
  - /dev/nvme0
  - /dev/nvme1
  - /dev/nvme2
  - /dev/mmcblk0
  - /dev/mmcblk1
  - /dev/fuse
hassio_api: true
homeassistant_api: true
hassio_role: homeassistant
map:
  - backup:ro
  - addon_config:rw
options:
  device: ""
  max_copies: 7
  sync_exist_start: false
schema:
  device: "str"
  max_copies: "int"
  sync_exist_start: "bool"
panel_icon: mdi:cloud-upload-outline
panel_title: "Backup browser"
ingress: true
ingress_stream: true
ingress_port: 8899
