name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:

  lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install linters
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck yamllint
          npm install -g markdownlint-cli

      - name: Run linters
        run: |
          shellcheck -S error -x -e SC1091 $(git ls-files "*.sh")
          yamllint .
          markdownlint .

  detect:
    runs-on: ubuntu-latest
    needs: lint
    outputs:
      addons: ${{ steps.detect.outputs.addons }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - id: detect
        run: |

          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE=${{ github.event.pull_request.base.sha }}
          else
            BASE=${{ github.event.before }}
          fi

          ADDONS=$(git diff $BASE ${{ github.sha }} --name-only | cut -d/ -f1 | sort -u)

          RESULT="[]"

          for addon in $ADDONS; do
            if [ -f "$addon/config.yaml" ]; then

              OLD=$(git show $BASE:$addon/config.yaml 2>/dev/null | grep '^version:' | awk '{print $2}')
              NEW=$(grep '^version:' $addon/config.yaml | awk '{print $2}')

              echo "addon=$addon OLD=$OLD NEW=$NEW"

              if [ -n "$OLD" ] && [ "$OLD" != "$NEW" ]; then
                RESULT=$(jq -c ". + [\"$addon\"]" <<< "$RESULT")
              fi

            fi
          done

          echo "addons=$RESULT" >> $GITHUB_OUTPUT


  build:
    needs: detect
    if: needs.detect.outputs.addons != '[]'

    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        addon: ${{ fromJson(needs.detect.outputs.addons) }}
        arch: [amd64, aarch64]

    permissions:
      contents: read
      packages: write

    steps:

      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: version
        run: |
          VERSION=$(grep '^version:' ${{ matrix.addon }}/config.yaml | awk '{print $2}' | tr -d '"')
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./${{ matrix.addon }}
          push: true
          platforms: linux/${{ matrix.arch }}

          labels: |  
            org.opencontainers.image.source=https://github.com/${{ github.repository }}  

          tags: |
            ghcr.io/${{ github.repository_owner }}/${{ matrix.addon }}-${{ matrix.arch }}:${{ steps.version.outputs.version }}
            ghcr.io/${{ github.repository_owner }}/${{ matrix.addon }}-${{ matrix.arch }}:latest

          cache-from: type=gha
          cache-to: type=gha,mode=max

