configuration:
  shutdown_host:
    name: Отключать хост
    description: >
      Если включено, при критическом уровне заряда ИБП
      будет выполнено корректное завершение работы системы.

  shutdown_battery_level:
    name: Уровень заряда батареи (%)
    description: >
      Уровень заряда батареи, при котором будет инициировано
      завершение работы системы. Оставьте пустым, чтобы использовать
      значение по умолчанию apcupsd.

  shutdown_runtime:
    name: Оставшееся время работы (минуты)
    description: >
      Время работы от батареи, при достижении которого будет
      инициировано завершение работы системы. Оставьте пустым,
      чтобы использовать значение по умолчанию apcupsd.