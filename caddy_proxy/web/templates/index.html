<!DOCTYPE html>
<html>
<head>
    <title>Caddy Proxy</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Caddy Proxy</h1>
            <button id="btn-create" class="btn-primary">+ Создать сайт</button>
        </div>

        <table id="sites-table">
            <thead>
                <tr>
                    <th>Source</th>
                    <th>SSL</th>
                    <th>Status</th>
                </tr>
            </thead>
            <tbody id="sites-list"></tbody>
        </table>
    </div>

    <!-- Модальное окно (три вкладки) -->
    <div id="modal" class="modal hidden">
        <div class="modal-content">
            <div class="modal-header">
                <span class="modal-title">Редактирование сайта</span>
                <span class="close">&times;</span>
            </div>
            <div class="tabs">
                <button class="tab-btn active" data-tab="general">Общие</button>
                <button class="tab-btn" data-tab="ssl">SSL</button>
                <button class="tab-btn" data-tab="advanced">Advanced</button>
            </div>
            <div class="tab-content active" id="tab-general">
                <!-- Поля вкладки Общие -->
            </div>
            <div class="tab-content" id="tab-ssl">
                <!-- Поля вкладки SSL -->
            </div>
            <div class="tab-content" id="tab-advanced">
                <!-- Поле Advanced -->
            </div>
            <div class="modal-footer">
                <button id="btn-cancel" class="btn-secondary">Отмена</button>
                <button id="btn-save" class="btn-primary">Сохранить</button>
            </div>
        </div>
    </div>

    <script>
        // JavaScript будет здесь
    </script>
</body>
</html>
