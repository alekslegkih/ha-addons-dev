name: "Caddy Proxy"
version: "0.0.1"
slug: "caddy_proxy"
description: "Caddy reverse-proxy"
arch:
  - aarch64
  - amd64

image: ghcr.io/alekslegkih/caddy_proxy-dev
startup: services
boot: auto
init: false

map:
  - addon_config:rw
  - ssl:ro

schema:
  log_level: list(trace|debug|info|warning|error|fatal)
  domain: str
  certfile: str
  keyfile: str
  enable_tls: bool
  subdomains:
    - name: str
      upstream_host: str
      enable_tls: bool
      endpoints:
        - port: port
          protocol: list(tcp|udp)

options:
  log_level: "info"
  domain: "example.com"
  certfile: "fullchain.pem"
  keyfile: "privkey.pem"
  enable_tls: true
  subdomains: []

ports:
  80/tcp: 80
  443/tcp: 443
ports_description:
  80/tcp: "HTTP"
  443/tcp: "HTTPS"
