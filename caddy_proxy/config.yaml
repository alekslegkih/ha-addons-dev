name: "Caddy Proxy"
version: "0.0.2"
slug: "caddy_proxy"
description: "Caddy reverse-proxy"
arch:
  - aarch64
  - amd64
image: ghcr.io/alekslegkih/caddy_proxy-dev

startup: services
boot: auto
init: false

map:
  - addon_config:rw
  - ssl:ro

schema:
  log_level: list(trace|debug|info|warning|error|fatal)
options:
  log_level: "info"

ports:
  80/tcp: 80
  443/tcp: 443
ports_description:
  80/tcp: "HTTP"
  443/tcp: "HTTPS"

ingress: true
ingress_port: 5000

